x-podman:
  in_pod: false

services:
  app:
    container_name: ${FORGE_CONTAINER_NAME:-forge_app_1}
    image: forge-app:${FORGE_IMAGE_TAG:-stable}
    network_mode: host
    userns_mode: keep-id
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      FORGE_DB_PATH: /data/forge.db
      FORGE_REPOS_DIR: /data/repos
      FORGE_SESSION_SECRET: ${FORGE_SESSION_SECRET:-forge-dev-secret-change-me-32chars}
      FORGE_ADMIN_USERNAME: ${FORGE_ADMIN_USERNAME:-admin}
      FORGE_ADMIN_PASSWORD: ${FORGE_ADMIN_PASSWORD:-admin}
      FORGE_CURSOR_API_KEY: ${FORGE_CURSOR_API_KEY:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      FORGE_CURSOR_AGENT_DIR: ${FORGE_CURSOR_AGENT_DIR:-}
      FORGE_CURSOR_CONFIG_DIR: ${FORGE_CURSOR_CONFIG_DIR:-}
      FORGE_HOST_MOUNTS_FILE: /data/forge-host-mounts.json
      FORGE_AGENT_BIN: /usr/local/bin/agent
      FORGE_GIT_USER_NAME: ${FORGE_GIT_USER_NAME:-Forge Agent}
      FORGE_GIT_USER_EMAIL: ${FORGE_GIT_USER_EMAIL:-forge-agent@localhost}
      FORGE_GITHUB_TOKEN: ${FORGE_GITHUB_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      FORGE_SELF_REPO: ${FORGE_SELF_REPO:-}
      FORGE_SELF_BRANCH: ${FORGE_SELF_BRANCH:-main}
      FORGE_STAGING_PORT: ${FORGE_STAGING_PORT:-3466}
      FORGE_CADDY_LOG_TCP_PORT: ${FORGE_CADDY_LOG_TCP_PORT:-3999}
      FORGE_GIT_PASSWORD: ${FORGE_GIT_PASSWORD:-}
      FORGE_GIT_USERNAME: ${FORGE_GIT_USERNAME:-}
      FORGE_CONTAINER_NAME: ${FORGE_CONTAINER_NAME:-}
      DOCKER_SOCKET: ${DOCKER_SOCKET:-}
      FORGE_DOCKER_SOCKET: ${FORGE_DOCKER_SOCKET:-/data/.skip-docker-socket}
      HOME: /data/agent-home
      PORT: ${HOST_PORT:-3000}
      DOCKER_HOST: ${DOCKER_HOST:-tcp://127.0.0.1:${FORGE_PODMAN_API_PORT:-18765}}
    volumes:
      - forge-data:/data
      - ${FORGE_CURSOR_AGENT_DIR:?Set FORGE_CURSOR_AGENT_DIR or redeploy with ./deploy.sh}:/opt/cursor-agent:ro,z
      - ${FORGE_CURSOR_CONFIG_DIR:?Set FORGE_CURSOR_CONFIG_DIR or redeploy with ./deploy.sh}:/opt/cursor-config:ro,z
      - ${DOCKER_SOCKET:?Set DOCKER_SOCKET or redeploy with ./deploy.sh}:/var/run/docker.sock
    restart: unless-stopped

  test:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      FORGE_DB_PATH: ":memory:"

volumes:
  forge-data:
